<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Configurações - Retroping™</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="topbar">
<a href="postagens.html">📰 Feed</a>
<a href="perfil.html">👤 Perfil</a>
<a href="sair.html">🚪 Sair</a>
</div>

<div class="container">
<h2>⚙️ Configurações</h2>

<div class="box">
<input type="text" id="novoNome" placeholder="Novo nome">
<input type="text" id="novaDescricao" placeholder="Nova descrição">
<button onclick="salvar()">Salvar Alterações</button>
</div>

<div class="box">
<button onclick="alternarPrivacidade()">Alternar Público/Privado</button>
</div>

<div class="box">
<button onclick="excluirConta()">Excluir Conta</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, deleteUser } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, updateDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDI2yUt-qHe-VY3gHNOsl2jKyNtN45ulAk",
  authDomain: "retroping-rp.firebaseapp.com",
  projectId: "retroping-rp"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

onAuthStateChanged(auth, user => {
  if (!user) window.location = "index.html";
  currentUser = user;
});

window.salvar = async () => {
  await updateDoc(doc(db,"users",currentUser.uid),{
    nome: novoNome.value,
    descricao: novaDescricao.value
  });
  alert("Atualizado!");
};

window.alternarPrivacidade = async () => {
  const snap = await getDoc(doc(db,"users",currentUser.uid));
  const atual = snap.data().privado;
  await updateDoc(doc(db,"users",currentUser.uid),{
    privado: !atual
  });
  alert("Privacidade alterada!");
};

window.excluirConta = async () => {
  await deleteDoc(doc(db,"users",currentUser.uid));
  await deleteUser(currentUser);
  window.location="index.html";
};
</script>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/auth.js"></script>

</body>
</html>
