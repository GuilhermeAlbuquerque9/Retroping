<!DOCTYPE html>
<html lang="pt-BR">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo">💻 Retroping™</div>
        <div class="menu">
            <a href="sobre.html">Sobre</a>
            <a href="postagens.html">Mensagem</a>
            <a href="perfil.html">Perfil</a>
            <a href="config.html">Config</a>
        </div>
    </div>

    <div class="main-layout">

        <!-- LOGIN -->
        <div class="sidebar">
            <h3>Entrar</h3>
            <form action="https://script.google.com/macros/s/AKfycbyYRHTdUBWp5sR_pSq7pN4gjiXj6h8sWs97Uf3_flWb_qhzpscbQX9-BeRe0U9bJXBSqw/exec" method="POST">
                <input type="hidden" name="tipo" value="login">
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="senha" placeholder="Senha" required>
                <button type="submit">Entrar</button>
            </form>

            <h3>Criar Conta</h3>
            <form action="https://script.google.com/macros/s/AKfycbyYRHTdUBWp5sR_pSq7pN4gjiXj6h8sWs97Uf3_flWb_qhzpscbQX9-BeRe0U9bJXBSqw/exec" method="POST">
                <input type="hidden" name="tipo" value="registro">
                <input type="text" name="nome" placeholder="Nome" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="senha" placeholder="Senha" required>
                <button type="submit">Criar Conta</button>
            </form>
        </div>

        <div class="content">
            <h2>Bem-vindo ao Retroping™</h2>
            <p>🌎 Acesso Global</p>
            <p>📵 Sem algoritmo infinito</p>
            <p>🔒 Privacidade total. Sem coleta de dados.</p>
        </div>

    </div>

    </div>
