<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mensagem - Retroping™</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="header">
    <div class="logo">💻 Retroping™</div>
    <div class="menu">
        <a href="index.html">Início</a>
        <a href="perfil.html">Perfil</a>
        <a href="config.html">Config</a>
    </div>
</div>

<div class="main-layout">

<div class="content">

<h2>Nova Mensagem</h2>

<form id="postForm">
    <input type="text" id="nome" placeholder="Seu Nome" required>
    <textarea id="mensagem" placeholder="Escreva sua mensagem..." required></textarea>
    <button type="submit">Publicar</button>
</form>

<h2>Mensagens Recentes</h2>
<div id="feed"></div>

</div>

</div>

<div class="footer">
© Retropixel™, 2025-2026. Todos os direitos reservados.
</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdSSQw759d6grvHGATmEOupCeTRka6AUWWuF6mXpNmsJnQBTOri28skK8jvyXlqqJStg/exec";

/* =========================
   REGISTRO
========================= */
document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const nome = document.getElementById("regNome").value;
    const email = document.getElementById("regEmail").value;
    const senha = document.getElementById("regSenha").value;

    try {
        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: new URLSearchParams({
                tipo: "registro",
                nome: nome,
                email: email,
                senha: senha
            })
        });

        const text = await response.text();

        if (text === "ok") {
            alert("Conta criada com sucesso!");
            document.getElementById("registerForm").reset();
        } else if (text === "email_existe") {
            alert("Este email já está cadastrado.");
        } else {
            alert("Erro ao criar conta.");
        }

    } catch (error) {
        alert("Erro de conexão.");
        console.error(error);
    }
});

/* =========================
   LOGIN
========================= */
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("loginEmail").value;
    const senha = document.getElementById("loginSenha").value;

    try {
        const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: new URLSearchParams({
                tipo: "login",
                email: email,
                senha: senha
            })
        });

        const text = await response.text();

        if (text.startsWith("ok|")) {
            const nome = text.split("|")[1];
            localStorage.setItem("usuario", nome);
            window.location.href = "postagens.html";
        } else {
            alert("Email ou senha incorretos.");
        }

    } catch (error) {
        alert("Erro de conexão.");
        console.error(error);
    }
});
</script>

</body>

</html>
